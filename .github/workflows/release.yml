name: release

# On a version tag (e.g. v0.2.0): build + test, produce the Native-AOT binaries per OS, publish the
# McpOrchestrator tool package to NuGet, and create a GitHub Release with the native binaries.
#
# Prerequisite: add a nuget.org API key as the repo secret NUGET_API_KEY
# (Settings -> Secrets and variables -> Actions). Then: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # to create the GitHub Release

jobs:
  build:
    name: build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64, exe: McpOrchestrator.exe }
          - { os: ubuntu-latest, rid: linux-x64, exe: McpOrchestrator }
          - { os: macos-latest, rid: osx-arm64, exe: McpOrchestrator }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Native AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build and test
        run: dotnet test McpOrchestrator.slnx -c Release

      - name: Native AOT publish
        run: dotnet publish McpOrchestrator/McpOrchestrator.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true -p:Version=${{ env.VERSION }} -o out

      - name: Smoke-test the native binary
        shell: bash
        env:
          MCP_ORCHESTRATOR_COMMAND: ${{ github.workspace }}/out/${{ matrix.exe }}
        run: |
          chmod +x "out/${{ matrix.exe }}" || true
          dotnet run --project McpOrchestrator.SmokeTest -c Release -- --check-tools

      - name: Upload native build
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.rid }}
          path: out/*
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Pack the tool package
        run: dotnet pack McpOrchestrator/McpOrchestrator.csproj -c Release -p:Version=${{ env.VERSION }} -o nupkg

      - name: Push to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Download native builds
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Zip native binaries per platform
        run: |
          mkdir -p release
          for dir in artifacts/native-*; do
            rid="${dir#artifacts/native-}"
            (cd "$dir" && zip -r "$GITHUB_WORKSPACE/release/McpOrchestrator-$VERSION-$rid.zip" .)
          done
          ls -la release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes release/*.zip
