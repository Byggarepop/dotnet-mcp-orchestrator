name: release

# On a version tag (e.g. v0.2.0): build + test, produce the Native-AOT binaries per OS, and create
# a GitHub Release with those binaries + the tool .nupkg attached.
#
# NuGet publishing uses Trusted Publishing (OIDC) — no stored API key. nuget.org issues a
# short-lived key to this workflow at run time. It is OFF by default; to enable it:
#   1. nuget.org -> (your username) -> Trusted Publishing -> add a policy:
#        Repository Owner: Byggarepop   Repository: dotnet-mcp-orchestrator   Workflow File: release.yml
#   2. add the repo secret   NUGET_USER    = your nuget.org username (profile name, NOT your email)
#   3. set the repo variable PUBLISH_NUGET = true   (Settings -> Secrets and variables -> Actions)
on:
  push:
    tags: ['v*']

jobs:
  build:
    name: build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64, exe: McpOrchestrator.exe }
          - { os: ubuntu-latest, rid: linux-x64, exe: McpOrchestrator }
          - { os: macos-latest, rid: osx-arm64, exe: McpOrchestrator }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Native AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build and test
        run: dotnet test McpOrchestrator.slnx -c Release

      - name: Native AOT publish
        run: dotnet publish McpOrchestrator/McpOrchestrator.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true -p:Version=${{ env.VERSION }} -o out

      - name: Smoke-test the native binary
        shell: bash
        env:
          MCP_ORCHESTRATOR_COMMAND: ${{ github.workspace }}/out/${{ matrix.exe }}
        run: |
          chmod +x "out/${{ matrix.exe }}" || true
          dotnet run --project McpOrchestrator.SmokeTest -c Release -- --check-tools

      - name: Upload native build
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.rid }}
          path: out/*
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # request the OIDC token for NuGet trusted publishing
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Pack the tool package
        run: dotnet pack McpOrchestrator/McpOrchestrator.csproj -c Release -p:Version=${{ env.VERSION }} -o nupkg

      # NuGet publishing is OFF unless you opt in (see header): both steps below run only when
      # PUBLISH_NUGET == 'true'. Trusted Publishing — login exchanges the OIDC token for a
      # short-lived key, requested just before the push (the key is valid ~1 hour).
      - name: NuGet login (OIDC -> temp API key)
        if: vars.PUBLISH_NUGET == 'true'
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: vars.PUBLISH_NUGET == 'true'
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Download native builds
        uses: actions/download-artifact@v8
        with:
          path: native

      - name: Zip native binaries + checksums
        run: |
          mkdir -p release
          for dir in native/native-*; do
            rid="${dir#native/native-}"
            (cd "$dir" && zip -r "$GITHUB_WORKSPACE/release/McpOrchestrator-$VERSION-$rid.zip" .)
          done
          # SHA256SUMS is consumed by the binary's opt-in self-updater to verify downloads.
          (cd release && sha256sum *.zip > SHA256SUMS)
          ls -la release && cat release/SHA256SUMS

      - name: Release notes from CHANGELOG
        run: |
          awk "/^## \[$VERSION\]/{f=1;next} f&&/^## \[/{exit} f{print}" CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then echo "Release $VERSION" > notes.md; fi
          cat notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md release/*.zip release/SHA256SUMS nupkg/*.nupkg
